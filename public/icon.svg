<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient with Dynamic Variable and Hex Fallback -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #10B981)"/>
      <stop offset="100%" stop-color="var(--accent, #06B6D4)"/>
    </linearGradient>

    <!-- Inner Glow/Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Node Glow Filter -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer (Transparent by default for PNG rasterization) -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Outer Shield Outline representing safety and containment -->
  <polygon 
    points="256,50 426,148 426,364 256,462 86,364 86,148" 
    fill="rgba(7, 10, 15, 0.6)" 
    stroke="url(#brand-grad)" 
    stroke-width="16" 
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.9"
  />

  <!-- Inner Echo Hexagon Lines for network grid feel -->
  <polygon 
    points="256,86 394,166 394,346 256,426 118,346 118,166" 
    fill="none" 
    stroke="rgba(255, 255, 255, 0.05)" 
    stroke-width="4" 
    stroke-linejoin="round"
  />

  <!-- The Main Pulse Wave representation (heartbeat/triage) -->
  <path 
    d="M 120,256 L 190,256 L 220,136 L 250,376 L 280,216 L 310,296 L 340,256 L 392,256" 
    fill="none" 
    stroke="url(#brand-grad)" 
    stroke-width="28" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Active Semantic Triage Nodes (glowing points) -->
  <circle cx="220" cy="136" r="14" fill="#06B6D4" filter="url(#node-glow)" />
  <circle cx="250" cy="376" r="14" fill="#10B981" filter="url(#node-glow)" />
  <circle cx="280" cy="216" r="10" fill="#06B6D4" filter="url(#node-glow)" />
</svg>
